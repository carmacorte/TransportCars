<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7faf9" />
  <title>SMTinel Vault — Manufacturing English Intelligence</title>
  <link rel="stylesheet" href="./assets/styles.css" />

  <!-- Patch: vista vertical real + textos compactos + sin Forced Landscape View -->
  <style id="portrait-no-landscape-patch">
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html,
    body {
      width: 100% !important;
      min-width: 0 !important;
      height: auto !important;
      min-height: 100dvh !important;
      margin: 0 !important;
      overflow-x: hidden !important;
      overflow-y: auto !important;
      touch-action: pan-y !important;
      transform: none !important;
      rotate: 0deg !important;
      writing-mode: horizontal-tb !important;
    }

    body,
    #app,
    #app > * {
      max-width: 100vw !important;
      box-sizing: border-box !important;
      transform: none !important;
      rotate: 0deg !important;
      transform-origin: center center !important;
      writing-mode: horizontal-tb !important;
    }

    #app {
      width: 100vw !important;
      min-height: 100dvh !important;
      padding-top: var(--safe-top) !important;
      padding-bottom: var(--safe-bottom) !important;
      overflow-x: hidden !important;
      overflow-y: auto !important;
    }

    /* Elimina cualquier UI relacionada con forzar horizontal */
    [class*="landscape" i],
    [id*="landscape" i],
    [aria-label*="landscape" i],
    [data-testid*="landscape" i],
    [data-landscape],
    .force-landscape,
    .forced-landscape,
    .landscape-toggle,
    .orientation-toggle {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }

    /* Normalización de layout para móvil vertical */
    main,
    section,
    header,
    nav,
    article,
    aside,
    .container,
    .page,
    .screen,
    .dashboard,
    .hero,
    .content,
    .panel,
    .cards,
    .grid,
    .stats,
    .metrics {
      width: 100% !important;
      max-width: 100vw !important;
      min-width: 0 !important;
      box-sizing: border-box !important;
    }

    img,
    svg,
    canvas,
    video {
      max-width: 100% !important;
      height: auto;
    }

    @media (max-width: 768px) {
      body {
        font-size: 12px !important;
      }

      h1,
      .h1,
      .title,
      .hero-title,
      [class*="title" i] {
        font-size: clamp(2.05rem, 10vw, 3.25rem) !important;
        line-height: 0.92 !important;
        letter-spacing: -0.055em !important;
      }

      h2,
      .h2,
      .subtitle,
      [class*="subtitle" i] {
        font-size: clamp(1rem, 4.8vw, 1.55rem) !important;
        line-height: 1.08 !important;
      }

      h3,
      .h3,
      .card-title,
      [class*="card-title" i],
      [class*="cardTitle"] {
        font-size: clamp(0.82rem, 3.8vw, 1.15rem) !important;
        line-height: 1.1 !important;
      }

      p,
      li,
      label,
      input,
      button,
      textarea,
      select,
      .text,
      .copy,
      .description,
      [class*="description" i] {
        font-size: clamp(0.72rem, 3.2vw, 0.92rem) !important;
        line-height: 1.3 !important;
      }

      .stat,
      .metric,
      .number,
      [class*="stat" i],
      [class*="metric" i],
      [class*="number" i] {
        font-size: clamp(1.7rem, 8.8vw, 2.75rem) !important;
        line-height: 0.95 !important;
      }

      .card,
      [class*="card" i] {
        min-width: 0 !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="./assets/app.js"></script>

  <script>
    (function () {
      const landscapeText = /forced\s+landscape\s+view|force\s+landscape\s+view/i;

      function hideLandscapeNodes() {
        const candidates = document.querySelectorAll('body *');

        candidates.forEach((node) => {
          if (!(node instanceof HTMLElement)) return;

          const text = (node.textContent || '').trim();
          const cls = String(node.className || '');
          const id = String(node.id || '');
          const aria = String(node.getAttribute('aria-label') || '');

          if (
            landscapeText.test(text) ||
            /landscape/i.test(cls) ||
            /landscape/i.test(id) ||
            /landscape/i.test(aria)
          ) {
            node.style.setProperty('display', 'none', 'important');
            node.style.setProperty('visibility', 'hidden', 'important');
            node.style.setProperty('pointer-events', 'none', 'important');
          }
        });
      }

      function resetForcedRotation() {
        const hardTargets = [
          document.documentElement,
          document.body,
          document.getElementById('app'),
          ...document.querySelectorAll('#app > *, [style*="rotate"], [style*="transform"], [class*="rotate" i], [class*="orientation" i]')
        ].filter(Boolean);

        hardTargets.forEach((el) => {
          if (!(el instanceof HTMLElement)) return;
          const inline = String(el.getAttribute('style') || '');
          const computed = window.getComputedStyle(el).transform;

          if (/rotate|matrix/i.test(inline) || (computed && computed !== 'none')) {
            el.style.setProperty('transform', 'none', 'important');
            el.style.setProperty('rotate', '0deg', 'important');
            el.style.setProperty('transform-origin', 'center center', 'important');
          }

          el.style.setProperty('writing-mode', 'horizontal-tb', 'important');
          el.style.setProperty('max-width', '100vw', 'important');
          el.style.setProperty('box-sizing', 'border-box', 'important');
        });

        document.documentElement.style.setProperty('overflow-x', 'hidden', 'important');
        document.body.style.setProperty('overflow-x', 'hidden', 'important');
        document.body.style.setProperty('overflow-y', 'auto', 'important');

        const app = document.getElementById('app');
        if (app) {
          app.style.setProperty('width', '100vw', 'important');
          app.style.setProperty('min-height', '100dvh', 'important');
          app.style.setProperty('overflow-x', 'hidden', 'important');
          app.style.setProperty('overflow-y', 'auto', 'important');
        }
      }

      function applyPortraitPatch() {
        hideLandscapeNodes();
        resetForcedRotation();
      }

      applyPortraitPatch();
      window.addEventListener('DOMContentLoaded', applyPortraitPatch);
      window.addEventListener('load', applyPortraitPatch);
      window.addEventListener('resize', applyPortraitPatch);
      window.addEventListener('orientationchange', applyPortraitPatch);

      const observer = new MutationObserver(applyPortraitPatch);
      observer.observe(document.documentElement, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['class', 'style', 'id', 'aria-label']
      });
    })();
  </script>
</body>
</html>
