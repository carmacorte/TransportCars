<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7faf9" />
  <title>SMTinel Vault — Manufacturing English Intelligence</title>
  <link rel="stylesheet" href="./assets/styles.css" />

  <!-- Portrait patch: NO oculta #app/body. Solo corrige rotación y elimina botón landscape. -->
  <style id="portrait-fix-patch">
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html,
    body {
      width: 100% !important;
      min-width: 0 !important;
      min-height: 100dvh !important;
      margin: 0 !important;
      overflow-x: hidden !important;
      overflow-y: auto !important;
      transform: none !important;
      rotate: 0deg !important;
      writing-mode: horizontal-tb !important;
      touch-action: pan-y !important;
    }

    #app {
      width: 100% !important;
      min-height: 100dvh !important;
      overflow-x: hidden !important;
      overflow-y: auto !important;
      transform: none !important;
      rotate: 0deg !important;
      transform-origin: center center !important;
      writing-mode: horizontal-tb !important;
      box-sizing: border-box !important;
    }

    #app,
    #app * {
      box-sizing: border-box !important;
    }

    body.portrait-ready #app > * {
      max-width: 100vw !important;
      transform-origin: center center !important;
      writing-mode: horizontal-tb !important;
    }

    /* Oculta únicamente controles pequeños relacionados con landscape, no contenedores principales */
    button[class*="landscape" i],
    a[class*="landscape" i],
    [role="button"][class*="landscape" i],
    button[id*="landscape" i],
    a[id*="landscape" i],
    [role="button"][id*="landscape" i],
    button[aria-label*="landscape" i],
    a[aria-label*="landscape" i],
    [role="button"][aria-label*="landscape" i],
    .force-landscape,
    .forced-landscape,
    .landscape-toggle,
    .orientation-toggle {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }

    @media (orientation: portrait), (max-width: 768px) {
      html,
      body,
      #app {
        width: 100% !important;
        height: auto !important;
        min-height: 100dvh !important;
      }

      main,
      section,
      header,
      nav,
      article,
      aside,
      .container,
      .page,
      .screen,
      .dashboard,
      .hero,
      .content,
      .panel,
      .cards,
      .grid,
      .stats,
      .metrics {
        max-width: 100vw !important;
        min-width: 0 !important;
      }

      body {
        font-size: 12px !important;
      }

      h1,
      .h1,
      .title,
      .hero-title,
      [class*="title" i] {
        font-size: clamp(2rem, 9.5vw, 3.2rem) !important;
        line-height: 0.95 !important;
        letter-spacing: -0.055em !important;
      }

      h2,
      .h2,
      .subtitle,
      [class*="subtitle" i] {
        font-size: clamp(0.95rem, 4.4vw, 1.45rem) !important;
        line-height: 1.12 !important;
      }

      h3,
      .h3,
      .card-title,
      [class*="card-title" i] {
        font-size: clamp(0.78rem, 3.5vw, 1.05rem) !important;
        line-height: 1.12 !important;
      }

      p,
      li,
      label,
      input,
      button,
      textarea,
      select,
      .text,
      .copy,
      .description,
      [class*="description" i] {
        font-size: clamp(0.7rem, 3.05vw, 0.9rem) !important;
        line-height: 1.32 !important;
      }

      .stat,
      .metric,
      .number,
      [class*="stat" i],
      [class*="metric" i],
      [class*="number" i] {
        font-size: clamp(1.55rem, 7.8vw, 2.55rem) !important;
        line-height: 0.98 !important;
      }

      img,
      svg,
      canvas,
      video {
        max-width: 100% !important;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="./assets/app.js"></script>

  <script>
    (function () {
      const LANDSCAPE_TEXT = /^(forced\s+landscape\s+view|force\s+landscape\s+view)$/i;

      function isMainContainer(el) {
        return el === document.documentElement || el === document.body || el.id === 'app';
      }

      function isSmallControl(el) {
        const tag = el.tagName.toLowerCase();
        const role = (el.getAttribute('role') || '').toLowerCase();
        const cls = String(el.className || '');
        const id = String(el.id || '');
        const aria = String(el.getAttribute('aria-label') || '');
        const text = (el.innerText || el.textContent || '').trim().replace(/\s+/g, ' ');
        const rect = el.getBoundingClientRect();

        return (
          tag === 'button' ||
          tag === 'a' ||
          role === 'button' ||
          /landscape|orientation/i.test(cls) ||
          /landscape|orientation/i.test(id) ||
          /landscape|orientation/i.test(aria) ||
          LANDSCAPE_TEXT.test(text)
        ) && rect.width <= 380 && rect.height <= 140;
      }

      function removeLandscapeControl() {
        document.querySelectorAll('body *').forEach((el) => {
          if (!(el instanceof HTMLElement) || isMainContainer(el)) return;
          if (isSmallControl(el)) {
            const text = (el.innerText || el.textContent || '').trim().replace(/\s+/g, ' ');
            const cls = String(el.className || '');
            const id = String(el.id || '');
            const aria = String(el.getAttribute('aria-label') || '');

            if (/landscape|orientation/i.test(cls + ' ' + id + ' ' + aria) || LANDSCAPE_TEXT.test(text)) {
              el.style.setProperty('display', 'none', 'important');
              el.style.setProperty('visibility', 'hidden', 'important');
              el.style.setProperty('pointer-events', 'none', 'important');
            }
          }
        });
      }

      function resetOnlyOuterRotation() {
        [document.documentElement, document.body, document.getElementById('app')].filter(Boolean).forEach((el) => {
          el.style.setProperty('transform', 'none', 'important');
          el.style.setProperty('rotate', '0deg', 'important');
          el.style.setProperty('writing-mode', 'horizontal-tb', 'important');
          el.style.setProperty('max-width', '100vw', 'important');
          el.style.setProperty('overflow-x', 'hidden', 'important');
        });
      }

      function applyPortraitFix() {
        document.body.classList.add('portrait-ready');
        resetOnlyOuterRotation();
        removeLandscapeControl();
      }

      window.addEventListener('DOMContentLoaded', applyPortraitFix);
      window.addEventListener('load', applyPortraitFix);
      window.addEventListener('resize', applyPortraitFix);
      window.addEventListener('orientationchange', applyPortraitFix);
      setTimeout(applyPortraitFix, 100);
      setTimeout(applyPortraitFix, 500);
      setTimeout(applyPortraitFix, 1200);

      new MutationObserver(applyPortraitFix).observe(document.documentElement, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['class', 'style', 'id', 'aria-label']
      });
    })();
  </script>
</body>
</html>
