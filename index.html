<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7faf9" />
  <meta name="screen-orientation" content="portrait" />
  <meta name="x5-orientation" content="portrait" />
  <title>SMTinel Vault — Manufacturing English Intelligence</title>
  <link rel="stylesheet" href="./assets/styles.css" />
  <style>
    html, body, #app {
      width: 100%;
      min-width: 0;
      min-height: 100dvh;
      margin: 0;
      overflow-x: hidden;
    }
    #app, #app * { box-sizing: border-box; }
    @media (orientation: portrait), (max-width: 820px) {
      body { font-size: 13px; }
      h1, .h1, .title, .hero-title {
        font-size: clamp(2rem, 9vw, 3.15rem);
        line-height: 0.95;
        letter-spacing: -0.055em;
      }
      h2, .h2, .subtitle {
        font-size: clamp(0.95rem, 4.2vw, 1.4rem);
        line-height: 1.12;
      }
      h3, .h3, .card-title {
        font-size: clamp(0.78rem, 3.4vw, 1.02rem);
        line-height: 1.12;
      }
      p, li, label, input, button, textarea, select, .text, .copy, .description {
        font-size: clamp(0.7rem, 3vw, 0.9rem);
        line-height: 1.32;
      }
      .stat, .metric, .number {
        font-size: clamp(1.55rem, 7.5vw, 2.5rem);
        line-height: 0.98;
      }
      img, svg, canvas, video { max-width: 100%; height: auto; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="./assets/modules/voice.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>
