<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7faf9" />
  <meta name="screen-orientation" content="portrait" />
  <meta name="x5-orientation" content="portrait" />
  <title>SMTinel Vault — Manufacturing English Intelligence</title>
  <link rel="stylesheet" href="./assets/styles.css" />

  <style>
    /* Portrait clean patch: no MutationObserver, no DOM deletion, no container hiding. */
    html,
    body,
    #app {
      width: 100% !important;
      min-width: 0 !important;
      min-height: 100dvh !important;
      margin: 0 !important;
      overflow-x: hidden !important;
      overflow-y: auto !important;
      transform: none !important;
      rotate: 0deg !important;
      writing-mode: horizontal-tb !important;
      touch-action: pan-y !important;
    }

    #app,
    #app * {
      box-sizing: border-box !important;
    }

    @media (orientation: portrait), (max-width: 820px) {
      body {
        font-size: 12px !important;
      }

      #app > *,
      main,
      section,
      header,
      nav,
      article,
      aside,
      .container,
      .page,
      .screen,
      .dashboard,
      .hero,
      .content,
      .panel,
      .cards,
      .grid,
      .stats,
      .metrics {
        width: 100% !important;
        max-width: 100vw !important;
        min-width: 0 !important;
        transform: none !important;
        rotate: 0deg !important;
        writing-mode: horizontal-tb !important;
      }

      /* Hide only the visible landscape pill/button. */
      .force-landscape,
      .forced-landscape,
      .landscape-toggle,
      .orientation-toggle,
      [class*="landscape" i],
      [id*="landscape" i],
      [aria-label*="landscape" i] {
        display: none !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }

      h1,
      .h1,
      .title,
      .hero-title,
      [class*="title" i] {
        font-size: clamp(2rem, 9vw, 3.15rem) !important;
        line-height: 0.95 !important;
        letter-spacing: -0.055em !important;
      }

      h2,
      .h2,
      .subtitle,
      [class*="subtitle" i] {
        font-size: clamp(0.95rem, 4.2vw, 1.4rem) !important;
        line-height: 1.12 !important;
      }

      h3,
      .h3,
      .card-title,
      [class*="card-title" i] {
        font-size: clamp(0.78rem, 3.4vw, 1.02rem) !important;
        line-height: 1.12 !important;
      }

      p,
      li,
      label,
      input,
      button,
      textarea,
      select,
      .text,
      .copy,
      .description,
      [class*="description" i] {
        font-size: clamp(0.7rem, 3vw, 0.9rem) !important;
        line-height: 1.32 !important;
      }

      .stat,
      .metric,
      .number,
      [class*="stat" i],
      [class*="metric" i],
      [class*="number" i] {
        font-size: clamp(1.55rem, 7.5vw, 2.5rem) !important;
        line-height: 0.98 !important;
      }

      img,
      svg,
      canvas,
      video {
        max-width: 100% !important;
        height: auto !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="./assets/app.js"></script>
</body>
</html>
