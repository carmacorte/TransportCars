<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#f7faf9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>SMTinel Vault — Manufacturing English Intelligence</title>
  <style>
    :root{
      --bg:#f7faf9;
      --ink:#071225;
      --muted:#66728a;
      --line:rgba(7,18,37,.10);
      --green:#0a9b73;
      --green2:#18d29a;
      --green3:#e8fff7;
      --blue:#247dff;
      --blue2:#e8f1ff;
      --danger:#ef3d4a;
      --danger2:#ffe8ea;
      --amber:#f59e0b;
      --amber2:#fff7e8;
      --purple:#8b5cf6;
      --card:rgba(255,255,255,.82);
      --card-hover:rgba(255,255,255,.95);
      --shadow:0 18px 45px rgba(14,40,70,.08);
      --shadow-sm:0 4px 12px rgba(14,40,70,.06);
      --radius:24px;
      --radius-sm:16px;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#app{min-height:100%;overflow-x:hidden}
    body{
      color:var(--ink);
      background:
        radial-gradient(circle at 4% 4%,rgba(22,211,153,.16),transparent 32%),
        radial-gradient(circle at 100% 38%,rgba(22,211,153,.08),transparent 28%),
        linear-gradient(180deg,#fbfdfc 0%,#f4f8f7 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:geometricPrecision;
      padding-bottom:env(safe-area-inset-bottom);
    }
    .phone{
      width:min(100%,430px);
      min-height:100vh;
      margin:0 auto;
      padding:env(safe-area-inset-top) 22px calc(92px + env(safe-area-inset-bottom));
      position:relative;
    }

    /* ===== TOPBAR ===== */
    .topbar{
      height:78px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      border-bottom:1px solid var(--line);
      margin:0 -22px 28px;
      padding:12px 22px 14px;
      background:rgba(255,255,255,.50);
      backdrop-filter:blur(18px);
      position:sticky;
      top:0;
      z-index:50;
    }
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .bot{
      width:38px;height:38px;border-radius:12px;display:grid;place-items:center;
      font-size:22px;background:linear-gradient(135deg,var(--green3),#fff);box-shadow:inset 0 0 0 1px var(--line);
      flex:0 0 auto;
    }
    .logo{font-weight:850;font-size:19px;letter-spacing:-.04em;white-space:nowrap}
    .logo span{color:var(--green)}
    .search{
      min-width:148px;max-width:175px;height:34px;border:1px solid var(--line);border-radius:16px;
      display:flex;align-items:center;gap:7px;padding:0 12px;background:rgba(255,255,255,.72);
      color:#9aa0aa;font-size:12.5px;white-space:nowrap;overflow:hidden;
      transition:all .2s ease;
    }
    .search:focus-within{border-color:var(--green);box-shadow:0 0 0 3px rgba(10,155,115,.12)}
    .search input{border:0;outline:0;background:transparent;width:100%;font-size:12.5px;color:var(--ink)}
    .search input::placeholder{color:#9aa0aa}

    /* ===== HERO ===== */
    .hero{position:relative;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start;margin-bottom:6px}
    .kicker{
      color:var(--green);font-size:11px;font-weight:850;letter-spacing:.48em;line-height:1.9;
      margin:8px 0 22px;text-transform:uppercase;
    }
    h1{
      margin:0;font-size:42px;line-height:.98;letter-spacing:-.075em;font-weight:900;max-width:330px;
    }
    .roi{
      display:block;width:max-content;background:linear-gradient(135deg,var(--green),var(--blue));
      color:transparent;-webkit-background-clip:text;background-clip:text;
    }
    .subtitle{
      margin:20px 0 24px;max-width:315px;color:var(--muted);font-size:16px;line-height:1.55;letter-spacing:-.02em;
    }
    .sideStats{display:flex;flex-direction:column;gap:14px;padding-top:8px}
    .pill{
      min-width:78px;height:42px;border-radius:18px;background:var(--card);border:1px solid var(--line);
      display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:var(--shadow);
      font-size:16px;font-weight:850;
      transition:transform .15s ease;
    }
    .pill:active{transform:scale(.95)}

    /* ===== SECTIONS ===== */
    .section{display:none;animation:fadeIn .3s ease}
    .section.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

    .section-title{
      font-size:28px;font-weight:900;letter-spacing:-.04em;margin:0 0 6px;
    }
    .section-sub{
      color:var(--muted);font-size:15px;line-height:1.5;margin:0 0 22px;
    }

    /* ===== CARDS / STATS ===== */
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
    .card{
      min-height:116px;padding:18px 10px 14px;border-radius:22px;background:var(--card);border:1px solid var(--line);
      box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
      transition:all .2s ease;
    }
    .card:active{transform:scale(.97)}
    .card .label{font-size:13px;line-height:1.1;color:var(--muted);font-weight:780;min-height:30px;display:flex;align-items:center}
    .card .num{font-size:29px;line-height:1;font-weight:900;margin:10px 0 13px;letter-spacing:-.04em}
    .card.green .num{color:var(--green)} .card.red .num{color:var(--danger)}
    .progress{width:80%;height:13px;border-radius:999px;background:#f9fffd;border:1px solid rgba(10,155,115,.12);overflow:hidden}
    .progress .bar{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,rgba(24,210,154,.08),rgba(24,210,154,.35));transition:width .6s ease}

    /* ===== ROLE GRID ===== */
    .role-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:28px}
    .role-card{
      padding:16px;border-radius:var(--radius);background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);
      cursor:pointer;transition:all .2s ease;position:relative;overflow:hidden;
    }
    .role-card::before{
      content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green);opacity:0;transition:opacity .2s;
    }
    .role-card.active::before{opacity:1}
    .role-card:active{transform:scale(.97)}
    .role-card:hover{background:var(--card-hover)}
    .role-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .role-ico{
      width:40px;height:40px;border-radius:14px;display:grid;place-items:center;
      background:var(--green3);font-size:22px;
    }
    .role-card h4{margin:0;font-size:16px;font-weight:800}
    .role-card p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.35}
    .role-card .progress{height:6px;margin-top:12px}
    .role-card .bar{background:linear-gradient(90deg,var(--green),var(--blue))}
    .badge{
      display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:800;
      background:var(--green3);color:var(--green);
    }
    .badge.blue{background:var(--blue2);color:var(--blue)}
    .badge.amber{background:var(--amber2);color:var(--amber)}
    .badge.red{background:var(--danger2);color:var(--danger)}

    /* ===== VAULT ===== */
    .vault-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:28px}
    .vault-card{
      padding:18px;border-radius:var(--radius);background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);
      cursor:pointer;transition:all .2s ease;position:relative;
    }
    .vault-card:active{transform:scale(.98)}
    .vault-card .badge{position:absolute;top:14px;right:14px}
    .vault-card h4{font-size:20px;margin:0 0 6px;font-weight:800}
    .vault-card p{margin:0;color:var(--muted);font-size:13px;line-height:1.4}
    .vault-card .meta{margin-top:10px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
    .vault-card .progress{height:6px;margin-top:12px}

    /* ===== CONCEPT PANEL ===== */
    .concept-panel{
      padding:22px;border-radius:var(--radius);background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);
      margin-bottom:28px;
    }
    .concept-panel .eyebrow{
      font-size:10px;font-weight:800;letter-spacing:.3em;text-transform:uppercase;color:var(--green);margin-bottom:8px;
    }
    .concept-panel h2{font-size:32px;font-weight:900;letter-spacing:-.04em;margin:0 0 6px}
    .concept-panel .sub{font-size:15px;color:var(--muted);margin-bottom:18px}
    .concept-panel .tabs{
      display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;
    }
    .concept-panel .tab{
      padding:10px 14px;border:0;background:transparent;color:var(--muted);border-bottom:3px solid transparent;
      cursor:pointer;font-weight:700;font-size:14px;white-space:nowrap;flex-shrink:0;
    }
    .concept-panel .tab.active{color:var(--green);border-bottom-color:var(--green)}
    .phrase-list{display:grid;gap:10px}
    .phrase{
      padding:14px;border-left:4px solid var(--green);background:var(--green3);border-radius:14px;
      color:var(--ink);font-size:15px;line-height:1.45;display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .phrase button{
      border:1px solid var(--line);background:#fff;border-radius:10px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--green);cursor:pointer;flex-shrink:0;
    }
    .phrase button:active{transform:scale(.95)}
    .def-box{
      padding:16px;border-radius:var(--radius-sm);background:var(--green3);border:1px solid rgba(10,155,115,.15);margin-bottom:14px;
    }
    .def-box p{font-size:15px;line-height:1.5;color:var(--ink);margin:0 0 10px}
    .formula{
      font-family:"SFMono-Regular",Consolas,monospace;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;color:var(--ink);font-size:14px;
    }
    .meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
    .meta-grid div{background:#f8fbfa;border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px;text-align:center}
    .meta-grid small{display:block;color:var(--muted);font-size:11px;margin-bottom:4px}
    .meta-grid strong{display:block;font-size:15px;font-weight:800}
    .action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
    .btn{
      height:46px;border:0;border-radius:14px;padding:0 18px;
      background:linear-gradient(135deg,var(--green),var(--blue));color:white;font-weight:800;font-size:14px;cursor:pointer;
      box-shadow:0 8px 20px rgba(10,155,115,.22);transition:all .15s ease;flex:1;min-width:120px;
    }
    .btn:active{transform:scale(.97);box-shadow:0 4px 12px rgba(10,155,115,.18)}
    .btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:var(--shadow-sm)}
    .textarea{
      width:100%;min-height:120px;border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;outline:none;resize:vertical;background:#f8fbfa;font-size:15px;
    }
    .textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(10,155,115,.1)}
    .feedback{
      border-radius:var(--radius-sm);background:var(--green3);border:1px solid rgba(10,155,115,.2);padding:14px;color:var(--green);font-size:14px;font-weight:700;margin-top:14px;
    }

    /* ===== BUCKETS ===== */
    .bucket-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:28px}
    .bucket{
      padding:16px;border-radius:var(--radius);background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);text-align:center;
    }
    .bucket strong{font-size:28px;display:block;margin:8px 0 4px}
    .bucket small{color:var(--muted);font-size:12px}

    /* ===== PRACTICE ===== */
    .script-card{
      border:1px solid var(--line);border-radius:var(--radius);background:#fff;padding:18px;margin-bottom:14px;
    }
    .script-card h4{margin:0 0 8px;font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
    .script-card p{font-size:18px;line-height:1.4;margin:12px 0;color:var(--ink);font-weight:700}
    .scenario-select{
      width:100%;height:44px;border:1px solid var(--line);border-radius:14px;background:#fff;padding:0 14px;font-size:14px;color:var(--ink);margin-bottom:18px;outline:none;
    }
    .scenario-select:focus{border-color:var(--green)}

    /* ===== SHADOWING ===== */
    .wave{
      height:48px;border-radius:14px;background:linear-gradient(90deg,rgba(10,155,115,.08),rgba(36,125,255,.08));
      display:flex;align-items:center;justify-content:center;gap:3px;overflow:hidden;
    }
    .wave span{display:block;width:4px;border-radius:999px;background:linear-gradient(var(--green),var(--blue));animation:wave 1.2s infinite ease-in-out}
    .wave span:nth-child(2n){animation-delay:.15s}
    .wave span:nth-child(3n){animation-delay:.3s}
    @keyframes wave{0%,100%{height:10px}50%{height:36px}}

    /* ===== ANALYTICS ===== */
    .analytics-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:28px}
    .metric-card{
      padding:18px;border-radius:var(--radius);background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);
    }
    .metric-card small{display:block;color:var(--muted);font-size:12px;margin-bottom:8px}
    .metric-card strong{font-size:32px;font-weight:900;letter-spacing:-.03em}
    .metric-card .progress{height:6px;margin-top:12px}

    /* ===== PATH / UNLOCK ===== */
    .path{display:grid;gap:14px;margin-bottom:28px}
    .path-item{
      display:grid;grid-template-columns:48px 1fr 60px;align-items:center;gap:12px;
      padding:14px;border-radius:var(--radius);background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);
    }
    .path-dot{
      width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-size:18px;font-weight:900;
    }
    .path-dot.done{background:var(--green3);color:var(--green);border:1px solid rgba(10,155,115,.3)}
    .path-dot.progress{background:var(--amber2);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
    .path-dot.lock{background:#f1f5f9;color:#94a3b8;border:1px solid #e2e8f0}
    .path-item h4{margin:0;font-size:16px;font-weight:800}
    .path-item p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .path-item > span{font-size:14px;font-weight:800;color:var(--muted)}

    /* ===== NAV ===== */
    .nav{
      position:fixed;left:50%;bottom:max(14px,env(safe-area-inset-bottom));transform:translateX(-50%);
      width:min(calc(100% - 44px),386px);height:60px;border-radius:32px;border:1px solid var(--line);
      background:rgba(255,255,255,.88);box-shadow:0 20px 50px rgba(16,40,70,.12);backdrop-filter:blur(18px);
      display:grid;grid-template-columns:repeat(5,1fr);align-items:center;justify-items:center;z-index:100;
    }
    .nav button{border:0;background:transparent;color:#637087;font-size:22px;width:48px;height:48px;border-radius:50%;display:grid;place-items:center;cursor:pointer;transition:all .15s ease;position:relative}
    .nav button:active{transform:scale(.9)}
    .nav button.active{background:rgba(19,212,150,.12);color:var(--green)}
    .nav button .label{position:absolute;bottom:-18px;font-size:9px;font-weight:800;opacity:0;transition:.2s;white-space:nowrap}
    .nav button.active .label{opacity:1;color:var(--green)}

    /* ===== TOAST ===== */
    .toast{
      position:fixed;top:max(14px,env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-80px);
      background:var(--ink);color:#fff;padding:12px 20px;border-radius:14px;font-size:14px;font-weight:700;
      box-shadow:var(--shadow);z-index:200;transition:transform .3s ease;white-space:nowrap;
    }
    .toast.show{transform:translateX(-50%) translateY(0)}

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar{width:0;height:0}

    @media (max-width:380px){
      .phone{padding-left:18px;padding-right:18px}
      .topbar{margin-left:-18px;margin-right:-18px;padding-left:18px;padding-right:18px}
      .logo{font-size:17px}
      .search{max-width:145px;min-width:130px;font-size:11.5px}
      h1{font-size:38px}
      .subtitle{font-size:15px}
      .kicker{font-size:10px;letter-spacing:.42em}
      .cards{gap:10px}
      .card{padding-left:8px;padding-right:8px}
      .card .label{font-size:12px}
      .card .num{font-size:27px}
      .pill{min-width:72px;font-size:15px}
      .section-title{font-size:24px}
      .role-grid{gap:10px}
      .role-card{padding:14px}
      .concept-panel h2{font-size:26px}
    }
  </style>
</head>
<body>
  <div id="app" class="phone"></div>
  <div id="toast" class="toast"></div>

  <nav class="nav" id="bottomNav" aria-label="Navegación principal">
    <button data-view="dashboard" onclick="go('dashboard')" title="Dashboard">▦<span class="label">Inicio</span></button>
    <button data-view="map" onclick="go('map')" title="Mapa">⌘<span class="label">Mapa</span></button>
    <button data-view="vault" onclick="go('vault')" title="Bóveda">▤<span class="label">Bóveda</span></button>
    <button data-view="practice" onclick="go('practice')" title="Práctica">🤖<span class="label">Práctica</span></button>
    <button data-view="shadowing" onclick="go('shadowing')" title="Shadowing">≋<span class="label">Shadow</span></button>
  </nav>

  <script>
    // ===== DATA =====
    const roles=[
      {id:'production',name:'Producción',icon:'🏭',concepts:['OEE','Downtime','Throughput','Line Balance'],progress:68,color:'green'},
      {id:'quality',name:'Calidad',icon:'🛡️',concepts:['8D','RCA','Containment','QR','QP'],progress:62,color:'blue'},
      {id:'maintenance',name:'Mantenimiento',icon:'🔧',concepts:['MTTR','MTBF','Preventive Maintenance'],progress:55,color:'amber'},
      {id:'process',name:'Procesos',icon:'🧬',concepts:['PFMEA','Control Plan','Cp/Cpk','SPC'],progress:60,color:'purple'},
      {id:'npi',name:'NPI / Readiness',icon:'🚀',concepts:['BRR','PPAP','APQP','CTB'],progress:50,color:'teal'},
      {id:'business',name:'Business Ops',icon:'📊',concepts:['SCR','Commit','Fiscal Quarter'],progress:48,color:'green'},
      {id:'msa',name:'MSA / Metrología',icon:'📏',concepts:['MSA','Gage R&R','NDC'],progress:46,color:'blue'},
      {id:'supply',name:'PCB Supply Chain',icon:'🌐',concepts:['Copper Volatility','Long Lead Time'],progress:45,color:'amber'},
      {id:'problem',name:'Problem Solving',icon:'🧠',concepts:['DMAIC','SIPOC','VSM','Fishbone'],progress:54,color:'purple'},
      {id:'inspection',name:'SMT / X-Ray',icon:'🔎',concepts:['X-Ray Inspection','BGA Solder Void'],progress:51,color:'teal'}
    ];
    const concepts={
      'OEE':{role:'Producción',abbr:'Overall Equipment Effectiveness',bucket:'Conversation Ready',progress:75,complexity:'Media',severity:'Alta',usage:'Muy alto',meaning:'Mide qué tan efectivamente se utiliza un equipo o línea considerando disponibilidad, desempeño y calidad.',formula:'OEE = Availability × Performance × Quality',phrases:['OEE dropped due to unplanned downtime on Line 3.','Availability is the main contributor to the OEE gap.','We need to separate performance loss from quality loss.'],questions:['Why did OEE drop this week?','Which factor is driving the OEE loss?']},
      'Downtime':{role:'Producción',abbr:'Production downtime',bucket:'Operationally Ready',progress:82,complexity:'Baja',severity:'Alta',usage:'Muy alto',meaning:'Tiempo en el que una línea, equipo o proceso no está disponible para producir.',formula:'Downtime impact = Lost time × planned rate',phrases:['Unplanned downtime impacted the production output.','The main downtime reason was equipment failure.','We need a recovery plan to offset downtime losses.'],questions:['What was the main downtime driver?']},
      'Throughput':{role:'Producción',abbr:'Output rate',bucket:'Understanding',progress:55,complexity:'Media',severity:'Media',usage:'Alto',meaning:'Cantidad de unidades procesadas en un periodo específico.',formula:'Throughput = Units produced / Time',phrases:['Throughput is below the planned rate.','The bottleneck is limiting throughput.','We need to increase throughput without impacting quality.'],questions:['What is limiting current throughput?']},
      'MTTR':{role:'Mantenimiento',abbr:'Mean Time To Repair',bucket:'Understanding',progress:48,complexity:'Media',severity:'Alta',usage:'Alto',meaning:'Tiempo promedio requerido para restaurar un equipo después de una falla.',formula:'MTTR = Total repair time / Number of repairs',phrases:['MTTR increased due to spare parts availability.','We need to reduce MTTR through faster troubleshooting.','The repair process is affecting equipment availability.'],questions:['Why did MTTR increase this month?']},
      'PFMEA':{role:'Procesos',abbr:'Process Failure Mode and Effects Analysis',bucket:'Phrase Ready',progress:58,complexity:'Alta',severity:'Alta',usage:'Muy alto',meaning:'Herramienta preventiva para identificar modos potenciales de falla en el proceso antes de que impacten producción o cliente.',formula:'Risk priority = Severity × Occurrence × Detection',phrases:['The PFMEA must reflect the current process risk.','We identified a high-risk failure mode during PFMEA review.','Controls need to be updated based on the PFMEA output.'],questions:['Which failure mode has the highest process risk?']},
      '8D':{role:'Calidad',abbr:'Eight Disciplines Problem Solving',bucket:'Conversation Ready',progress:72,complexity:'Media',severity:'Alta',usage:'Muy alto',meaning:'Metodología estructurada de resolución de problemas: equipo, descripción, contención, causa raíz, acciones correctivas y prevención.',formula:'3D = Containment | 4D = RCA | 8D = Closure',phrases:['The 8D is pending root cause validation.','Containment was implemented to prevent further escapes.','Corrective actions must prevent recurrence.'],questions:['What is the current 8D status?']},
      'DMAIC':{role:'Problem Solving',abbr:'Define Measure Analyze Improve Control',bucket:'Phrase Ready',progress:61,complexity:'Media',severity:'Media',usage:'Alto',meaning:'Metodología Six Sigma para resolver problemas complejos mediante fases estructuradas.',formula:'Define → Measure → Analyze → Improve → Control',phrases:['We are currently in the Measure phase.','The Analyze phase confirmed the main root cause.','Control actions are required to sustain the improvement.'],questions:['Which DMAIC phase are we currently in?']},
      'NDC':{role:'MSA / Metrología',abbr:'Number of Distinct Categories',bucket:'New Input',progress:32,complexity:'Alta',severity:'Alta',usage:'Medio',meaning:'Indica cuántas categorías distintas puede diferenciar un sistema de medición. Un NDC bajo puede ocultar variación real del proceso.',formula:'NDC ≈ 1.41 × PV / GRR',phrases:['NDC is below the minimum acceptable threshold.','The measurement system cannot distinguish process variation.','We should not trust SPC results until MSA is validated.'],questions:['Can the measurement system distinguish process variation?']},
      'Gage R&R':{role:'MSA / Metrología',abbr:'Gage Repeatability and Reproducibility',bucket:'Understanding',progress:44,complexity:'Alta',severity:'Alta',usage:'Alto',meaning:'Evalúa cuánto de la variación observada proviene del sistema de medición.',formula:'%GRR = Measurement variation / Total variation',phrases:['The Gage R&R result is not acceptable for this process.','Operator variation is driving the measurement error.','We need to validate the measurement system before capability analysis.'],questions:['Is the measurement system acceptable?']},
      'BRR':{role:'NPI / Readiness',abbr:'Build Readiness Review',bucket:'Phrase Ready',progress:57,complexity:'Alta',severity:'Alta',usage:'Muy alto',meaning:'Checkpoint de NPI para confirmar que el build está listo: materiales, CTB, AVL, BOM, proceso, layout, fixtures, waterfall, riesgos y action tracker.',formula:'BRR readiness = CTB + Process + Material + Risk + Owners',phrases:['The BRR is pending material readiness confirmation.','We need to close open actions before BRR approval.','The build cannot proceed without CTB confirmation.','Current risks were identified during the BRR review.'],questions:['Is the build ready to proceed?','Which BRR items are still open?']},
      'CTB':{role:'NPI / Readiness',abbr:'Clear To Build',bucket:'Conversation Ready',progress:66,complexity:'Media',severity:'Alta',usage:'Muy alto',meaning:'Estado que confirma que materiales, componentes y condiciones mínimas están listas para iniciar el build.',formula:'CTB = Material + BOM + Allocation + Availability',phrases:['The build is not CTB yet.','Material readiness is the current CTB blocker.','We need CTB confirmation before releasing the build.'],questions:['Are we clear to build?']}
    };
    const bucketOrder=['New Input','Understanding','Phrase Ready','Conversation Ready','Operationally Ready','At Risk'];
    const scenarios=[
      {title:'BRR Readiness Meeting',role:'NPI Quality Engineer',question:'Is the build ready to proceed next week?',terms:['BRR','CTB','AVL','Action Tracker']},
      {title:'QR / QP Weekly Review',role:'Quality Engineer',question:'What are the top quality risks and performance gaps this week?',terms:['QR','QP','PPR','Yield']},
      {title:'Backlog Recovery Call',role:'Program Operations',question:'Why is backlog increasing despite the pull-in recovery plan?',terms:['Backlog','Pull In','Commit','Forecast']},
      {title:'MSA Validation Review',role:'Quality / Metrology',question:'Can we trust the SPC and capability results with the current measurement system?',terms:['MSA','Gage R&R','NDC','SPC']},
      {title:'X-Ray Defect Review',role:'SMT Quality',question:'What did the X-Ray inspection reveal about the BGA solder joints?',terms:['X-Ray Inspection','BGA Solder Void','Head-in-Pillow']}
    ];

    // ===== STATE =====
    let state={view:'dashboard',role:'production',concept:'OEE',tab:'summary',query:'',feedback:'',selectedScenario:0};
    const saved=JSON.parse(localStorage.getItem('smtinel-progress')||'{}');

    // ===== HELPERS =====
    function $(sel){return document.querySelector(sel)}
    function $$(sel){return document.querySelectorAll(sel)}
    function currentConcept(){return concepts[state.concept]||concepts.OEE}
    function getProgress(name){return saved[name]?.progress ?? concepts[name]?.progress ?? 0}
    function getBucket(name){return saved[name]?.bucket ?? concepts[name]?.bucket ?? 'New Input'}
    function saveConcept(name,patch){saved[name]={...(saved[name]||{}),...patch};localStorage.setItem('smtinel-progress',JSON.stringify(saved))}
    function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
    function speak(text){if(!('speechSynthesis'in window))return; speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.88;u.pitch=1;speechSynthesis.speak(u)}
    function go(view){state.view=view;updateNav();render()}
    function selectRole(id){state.role=id;const r=roles.find(x=>x.id===id);if(r&&r.concepts[0]){state.concept=r.concepts[0]}go('map')}
    function selectConcept(name){state.concept=name;state.tab='summary';go('vault')}
    function setTab(tab){state.tab=tab;render()}
    function advanceConcept(name){const p=Math.min(100,getProgress(name)+12);let bucket=getBucket(name);if(p>=85)bucket='Operationally Ready';else if(p>=68)bucket='Conversation Ready';else if(p>=50)bucket='Phrase Ready';else if(p>=32)bucket='Understanding';saveConcept(name,{progress:p,bucket,lastPractice:new Date().toLocaleDateString('es-MX')});toast(`${name} → ${bucket} (${p}%)`);render()}
    function evaluateText(){const c=currentConcept();const text=$('#practiceText')?.value||'';const terms=[state.concept,...c.abbr.split(' ').filter(x=>x.length>3),'risk','action','validate','impact','support'];let hits=terms.filter(t=>text.toLowerCase().includes(t.toLowerCase())).length;let score=Math.min(95,45+hits*8+Math.min(20,Math.floor(text.length/20)));state.feedback=`${score}% clarity. ${score>75?'Good meeting-ready answer.':'Add evidence, impact, and next action.'}`;if(score>65)advanceConcept(state.concept);else render()}
    function bucketCounts(){const counts=Object.fromEntries(bucketOrder.map(b=>[b,0]));Object.keys(concepts).forEach(n=>{counts[getBucket(n)]=(counts[getBucket(n)]||0)+1});return counts}
    function filteredConceptNames(){const q=state.query.toLowerCase();let names=Object.keys(concepts);if(state.role!=='all'){const r=roles.find(x=>x.id===state.role);if(r)names=r.concepts.filter(n=>concepts[n])}if(q)names=names.filter(n=>n.toLowerCase().includes(q)||concepts[n].abbr.toLowerCase().includes(q)||concepts[n].meaning.toLowerCase().includes(q));return names}
    function updateNav(){$$('#bottomNav button').forEach(b=>b.classList.toggle('active',b.dataset.view===state.view))}

    // ===== RENDERERS =====
    function renderHeader(){return `
      <header class="topbar">
        <div class="brand">
          <div class="bot">🛡️</div>
          <div class="logo">SMTinel <span>Vault</span></div>
        </div>
        <div class="search">
          <b>⌕</b>
          <input type="text" placeholder="Buscar concepto..." value="${state.query}" 
            oninput="state.query=this.value;render()" 
            onfocus="if(state.view!=='map'&&state.view!=='vault')go('vault')"/>
        </div>
      </header>`}

    function renderHero(){return `
      <section class="hero">
        <div>
          <div class="kicker">Operational Knowledge<br>+ English Acquisition</div>
          <h1>Mapa de<br>Aprendizaje por <span class="roi">Rol</span></h1>
          <p class="subtitle">Aprende herramientas de manufactura, su significado técnico y cómo explicarlas en inglés en situaciones reales.</p>
        </div>
        <aside class="sideStats">
          <div class="pill">🔥 <span>24</span></div>
          <div class="pill">◷ <span>72%</span></div>
          <div class="pill">🏅 <span>Lv 8</span></div>
        </aside>
      </section>`}

    function renderStatsCards(){return `
      <section class="cards" aria-label="Resumen">
        <article class="card">
          <div class="label">Conceptos<br>en bóveda</div>
          <div class="num">${Object.keys(concepts).length}</div>
          <div class="progress"><div class="bar" style="width:100%"></div></div>
        </article>
        <article class="card green">
          <div class="label">Conversation<br>Ready</div>
          <div class="num">${Object.keys(concepts).filter(n=>getBucket(n)==='Conversation Ready').length}</div>
          <div class="progress"><div class="bar" style="width:34%"></div></div>
        </article>
        <article class="card red">
          <div class="label">At Risk</div>
          <div class="num">${Object.keys(concepts).filter(n=>getBucket(n)==='At Risk').length}</div>
          <div class="progress"><div class="bar" style="width:0%"></div></div>
        </article>
      </section>`}

    function renderRoleGrid(){return `
      <div class="role-grid">
        ${roles.map(r=>`
          <div class="role-card ${state.role===r.id?'active':''}" onclick="selectRole('${r.id}')">
            <div class="role-head">
              <div class="role-ico">${r.icon}</div>
              <span class="badge ${r.color==='blue'?'blue':r.color==='amber'?'amber':r.color==='red'?'red':r.color==='purple'?'purple':''}">${r.progress}%</span>
            </div>
            <h4>${r.name}</h4>
            <p>${r.concepts.slice(0,3).join(', ')}</p>
            <div class="progress"><div class="bar" style="width:${r.progress}%"></div></div>
          </div>
        `).join('')}
      </div>`}

    function renderConceptPanel(){const c=currentConcept();const p=getProgress(state.concept);const b=getBucket(state.concept);let content='';
      if(state.tab==='summary')content=`
        <div class="def-box"><p>${c.meaning}</p><div class="formula">${c.formula}</div></div>
        <div class="meta-grid">
          <div><small>Complejidad</small><strong>${c.complexity}</strong></div>
          <div><small>Severidad</small><strong>${c.severity}</strong></div>
          <div><small>Uso</small><strong>${c.usage}</strong></div>
        </div>`;
      if(state.tab==='phrases')content=`
        <div class="phrase-list">${c.phrases.map(x=>`
          <div class="phrase">${x}<button onclick="speak('${x.replace(/'/g,"\'")}')">▶ Listen</button></div>
        `).join('')}</div>`;
      if(state.tab==='questions')content=`
        <div class="phrase-list">${(c.questions||[]).map(x=>`
          <div class="phrase">${x}<button onclick="speak('${x.replace(/'/g,"\'")}')">▶ Audio</button></div>
        `).join('')}</div>`;
      if(state.tab==='practice')content=`
        <div class="script-card"><h4>Meeting answer practice</h4><p>${c.questions?.[0]||'Explain this concept in a meeting.'}</p></div>
        <textarea id="practiceText" class="textarea" placeholder="Write your answer in English..."></textarea>
        <div class="action-row">
          <button class="btn" onclick="evaluateText()">Evaluate</button>
          <button class="btn secondary" onclick="speak('${(c.questions?.[0]||'').replace(/'/g,"\'")}')">Listen Q</button>
        </div>
        ${state.feedback?`<div class="feedback">${state.feedback}</div>`:''}`;
      return `
      <div class="concept-panel">
        <div class="eyebrow">Concepto seleccionado</div>
        <h2>${state.concept}</h2>
        <div class="sub">${c.abbr} <span class="badge">${b}</span></div>
        <div class="tabs">
          ${[['summary','Resumen'],['phrases','Frases'],['questions','Preguntas'],['practice','Práctica']].map(([id,label])=>`
            <button class="tab ${state.tab===id?'active':''}" onclick="setTab('${id}')">${label}</button>
          `).join('')}
        </div>
        ${content}
        <div class="action-row">
          <button class="btn" onclick="advanceConcept('${state.concept}')">✓ Practice</button>
          <button class="btn secondary" onclick="go('shadowing')">≋ Shadow</button>
        </div>
      </div>`}

    function renderVaultGrid(){const names=filteredConceptNames();return `
      <div class="vault-grid">
        ${names.map(n=>{const c=concepts[n];return `
          <div class="vault-card" onclick="selectConcept('${n}')">
            <span class="badge ${getBucket(n)==='New Input'?'blue':getBucket(n)==='Phrase Ready'?'amber':getBucket(n)==='At Risk'?'red':''}">${getBucket(n)}</span>
            <h4>${n}</h4>
            <p>${c.abbr}</p>
            <div class="meta">${c.role} · ${getProgress(n)}% ready</div>
            <div class="progress"><div class="bar" style="width:${getProgress(n)}%"></div></div>
          </div>
        `}).join('')}
      </div>`}

    function renderBuckets(){const counts=bucketCounts();return `
      <div class="bucket-row">
        ${bucketOrder.map(b=>`
          <div class="bucket">
            <span class="badge ${b==='At Risk'?'red':b==='New Input'?'blue':b==='Phrase Ready'?'amber':''}">${b}</span>
            <strong>${counts[b]||0}</strong>
            <small>conceptos</small>
          </div>
        `).join('')}
      </div>`}

    function renderPath(){return `
      <div class="path">
        ${['OEE','Downtime','Throughput','Line Balance','Bottleneck Analysis','Capacity Planning','Ramp Readiness'].map((n,i)=>`
          <div class="path-item">
            <div class="path-dot ${i<2?'done':i<4?'progress':'lock'}">${i<2?'✓':i<4?'○':'🔒'}</div>
            <div><h4>${n}</h4><p>${i<2?'Dominado':i<4?'En progreso':'Bloqueado'}</p></div>
            <span>${i<2?'100%':i<4?'55%':'0%'}</span>
          </div>
        `).join('')}
      </div>`}

    function renderScenario(){const s=scenarios[state.selectedScenario];return `
      <div style="margin-bottom:28px">
        <h2 class="section-title">${s.title}</h2>
        <p class="section-sub">Rol: ${s.role}</p>
        <div class="script-card"><h4>Pregunta de reunión</h4><p>${s.question}</p></div>
        <textarea id="practiceText" class="textarea" placeholder="Responde en inglés. Incluye evidencia, impacto, riesgo y siguiente acción..."></textarea>
        <div class="action-row">
          <button class="btn" onclick="evaluateText()">Evaluar</button>
          <button class="btn secondary" onclick="speak('${s.question.replace(/'/g,"\'")}')">Escuchar</button>
        </div>
        ${state.feedback?`<div class="feedback">${state.feedback}</div>`:''}
      </div>
      <div class="concept-panel">
        <h4 style="margin:0 0 14px;font-size:14px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)">Conceptos esperados</h4>
        <div class="phrase-list">${s.terms.map(t=>`
          <div class="phrase">${t}<button onclick="selectConcept('${concepts[t]?t:'OEE'}')">Abrir</button></div>
        `).join('')}</div>
      </div>`}

    function renderShadowing(){const c=currentConcept();const scripts=c.phrases.concat(c.questions||[]);return `
      <div style="margin-bottom:28px">
        <h2 class="section-title">${state.concept}</h2>
        <p class="section-sub">Shadowing phrase pack · ${scripts.length} scripts</p>
        ${scripts.map((x,i)=>`
          <div class="script-card">
            <h4>Script ${i+1}</h4>
            <p>${x}</p>
            <div class="wave">${Array.from({length:24},()=>'<span></span>').join('')}</div>
            <div class="action-row" style="margin-top:12px">
              <button class="btn" onclick="speak('${x.replace(/'/g,"\'")}')">▶ Listen</button>
              <button class="btn secondary" onclick="advanceConcept('${state.concept}')">✓ Mark</button>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="analytics-grid">
        <div class="metric-card"><small>Pacing</small><strong>82%</strong><div class="progress"><div class="bar" style="width:82%"></div></div></div>
        <div class="metric-card"><small>Clarity</small><strong>78%</strong><div class="progress"><div class="bar" style="width:78%"></div></div></div>
        <div class="metric-card"><small>Chunk Sync</small><strong>69%</strong><div class="progress"><div class="bar" style="width:69%"></div></div></div>
        <div class="metric-card"><small>Confidence</small><strong>74%</strong><div class="progress"><div class="bar" style="width:74%"></div></div></div>
      </div>`}

    function renderAnalytics(){return `
      <h2 class="section-title">Analytics</h2>
      <p class="section-sub">Métricas de fluidez, claridad y readiness operacional</p>
      <div class="analytics-grid">
        <div class="metric-card"><small>Readiness</small><strong>72%</strong><div class="progress"><div class="bar" style="width:72%"></div></div></div>
        <div class="metric-card"><small>Vocabulary</small><strong>842</strong><div class="progress"><div class="bar" style="width:64%"></div></div></div>
        <div class="metric-card"><small>Latency</small><strong>1.8s</strong><div class="progress"><div class="bar" style="width:78%"></div></div></div>
        <div class="metric-card"><small>Escalation</small><strong>58%</strong><div class="progress"><div class="bar" style="width:58%"></div></div></div>
      </div>
      <div class="concept-panel" style="margin-top:28px">
        <h4 style="margin:0 0 14px">Role readiness</h4>
        <div class="phrase-list">${roles.map(r=>`
          <div class="phrase">${r.icon} ${r.name}<span style="margin-left:auto;font-weight:800">${r.progress}%</span></div>
        `).join('')}</div>
      </div>`}

    // ===== MAIN RENDER =====
    function render(){const app=$('#app');
      let html=renderHeader();
      if(state.view==='dashboard'){
        html+=renderHero()+renderStatsCards()+renderRoleGrid()+renderBuckets();
      }else if(state.view==='map'){
        html+=`<h2 class="section-title" style="margin-top:8px">Mapa de Conocimiento</h2><p class="section-sub">${roles.find(r=>r.id===state.role)?.name||'Todos'} · ${filteredConceptNames().length} conceptos</p>`+renderRoleGrid()+renderConceptPanel();
      }else if(state.view==='vault'){
        html+=`<h2 class="section-title" style="margin-top:8px">Bóveda Técnica</h2><p class="section-sub">${filteredConceptNames().length} conceptos · ${state.query?'Filtrado':'Todos'}</p>`+renderVaultGrid()+renderConceptPanel();
      }else if(state.view==='practice'){
        html+=`<h2 class="section-title" style="margin-top:8px">Práctica con IA</h2>
        <select class="scenario-select" onchange="state.selectedScenario=+this.value;state.feedback='';render()">
          ${scenarios.map((x,i)=>`<option value="${i}" ${i===state.selectedScenario?'selected':''}>${x.title}</option>`).join('')}
        </select>`+renderScenario();
      }else if(state.view==='shadowing'){
        html+=renderShadowing();
      }else if(state.view==='analytics'){
        html+=renderAnalytics();
      }
      app.innerHTML=html;
      state.feedback='';
    }

    // ===== INIT =====
    updateNav();
    render();
  </script>
</body>
</html>
